<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mood Weather App</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="app">

    <h1>SkyMood 🌦️</h1>

    <div class="search">
      <input type="text" id="cityInput" placeholder="Enter city..." />
      <button onclick="getWeather()">Search</button>
    </div>

    <div class="card">
      <h2 id="city">—</h2>
      <p id="temp">--°C</p>
      <p id="condition">Waiting for weather...</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
